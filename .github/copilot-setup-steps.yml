# Copilot Cloud Agent Setup Steps
# FallingCircles uses TypeScript (compiled via esbuild) with no runtime dependencies.
# This file configures the environment for the GitHub Copilot coding agent.

name: "Copilot Setup"

steps:
  - name: "Install dependencies and build"
    run: |
      echo "Installing dev dependencies..."
      npm ci
      echo ""
      echo "Building TypeScript sources..."
      npm run build
      echo ""
      echo "Build complete. To test: serve the project root with a local HTTP server."

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Falling Circles</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <canvas id="canvas"></canvas>

  <!-- Settings Toggle Button -->
  <button id="settingsToggle" title="Settings">⚙</button>

  <!-- Settings Panel -->
  <div id="settingsPanel" class="hidden">
    <h2>Settings</h2>

    <label>Circle Radius
      <input type="range" id="circleRadius" min="3" max="20" value="10" step="1">
      <span id="circleRadiusVal">10</span>
    </label>

    <label>Fall Speed
      <input type="range" id="fallSpeed" min="0.5" max="6" value="1.25" step="0.25">
      <span id="fallSpeedVal">1.25</span>
    </label>

    <label>Spawn Rate
      <input type="range" id="spawnRate" min="0.005" max="0.15" value="0.025" step="0.005">
      <span id="spawnRateVal">0.025</span>
    </label>

    <label>Trail Length
      <input type="range" id="trailLength" min="3" max="50" value="24" step="1">
      <span id="trailLengthVal">24</span>
    </label>

    <label>Max Circles per Column
      <input type="range" id="maxPerColumn" min="1" max="10" value="8" step="1">
      <span id="maxPerColumnVal">8</span>
    </label>

    <label>Gap Between Circles (px)
      <input type="range" id="gap" min="1" max="8" value="1" step="1">
      <span id="gapVal">1</span>
    </label>

    <h3>Mouse Effect</h3>

    <label>Mouse Effect Radius
      <input type="range" id="mouseRadius" min="30" max="300" value="120" step="10">
      <span id="mouseRadiusVal">120</span>
    </label>

    <h3>Image Trail</h3>

    <label class="checkbox-label">
      <input type="checkbox" id="whiteCirclesOnly">
      White Circles Only – disable picture, use plain white circles
    </label>

    <label class="checkbox-label">
      <input type="checkbox" id="trailDim">
      Trail Dim – trails fade opacity in addition to shrinking
    </label>

    <label>Trail Brightness
      <input type="range" id="trailBrightness" min="0" max="2" value="1" step="0.05">
      <span id="trailBrightnessVal">1</span>
    </label>

    <h3>Head Circle Tuning</h3>

    <label class="checkbox-label">
      <input type="checkbox" id="continuousHead" checked>
      Continuous Head – falls smoothly, leaves quantized trail
    </label>

    <label>Head Smoothing
      <input type="range" id="headSmoothing" min="0" max="1" value="0.8" step="0.05">
      <span id="headSmoothingVal">0.8</span>
    </label>

    <label>Head Scale Min
      <input type="range" id="headScaleMin" min="0.1" max="1" value="0.3" step="0.05">
      <span id="headScaleMinVal">0.3</span>
    </label>

    <label>Head Fade Min
      <input type="range" id="headFadeMin" min="0.1" max="1" value="0.4" step="0.05">
      <span id="headFadeMinVal">0.4</span>
    </label>
  </div>

  <script src="app.js"></script>
</body>
</html>
